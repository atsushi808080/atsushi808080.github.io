                { Ranking: 10, Name: "東部高科", Country: "南韓", Ratio: 1 }
            ]
        };
        //圓餅圖需要data陣列中的Name/Ratio
        //宣告待轉換的空變數
        let companies = [];// Name/公司
        let data = [];// Ratio/市佔率

        //宣告待轉換的空變數
        let marketingShareArray = [];//Object to 2D Array
        let container;
        let table;
        let thead;
        let tbody;

        function initializeTable() {
            // 使用 DOM API抓取ID名稱為'container'的DIV標籤,指派給container變數
            container = document.getElementById('container');
            // 使用 DOM API 創建<table>標籤指派給table變數
            table = document.createElement('table');
            // 使用 DOM API 創建<thead>標籤指派給thead變數
            thead = document.createElement('thead');
            // 使用 DOM API 創建<tbody>標籤指派給tbody變數
            tbody = document.createElement('tbody');
            // 使用 DOM API 設定table變數裡面的<table>標籤中的class屬性值(bootstrap框架)
            table.setAttribute("class", "table table-bordered table-striped table-secondary  table-hover");
        }

        //動態創建table>thead內的tr與th(參數傳入陣列)
        function CreateThead(titleArray) {
            // 創建<tr>標籤指派給theadTR變數
            let theadTR = document.createElement("tr");
            // 把傳入的陣列forEach迭代
            titleArray.forEach((item, index) => {
                // 創建<th>標籤指派給th變數
                let th = document.createElement("th");
                // 將陣列迭代出來的值指派給th.innerText設定文字內容
                th.innerText = item;
                // 將動態生成的tr標籤內加入th
                theadTR.append(th);
            });
            // 把forEach後的theadTR加入thead內
            thead.append(theadTR);
            //把製作好的thead加入table內
            table.append(thead);
            //把製作好的table加入container內
            container.append(table);
        }

        function objectToArray() {
            //將data陣列內的每筆Object 轉 2D Array
            marketingShare.data.forEach(item => {
                // 將每個迭代出來的物件使用Object.values()
                // 提取物件中所有可枚舉屬性的值，並返回這些值所組成的陣列
                let values = Object.values(item);
                //查看console的值
                console.log(values);
                // 空陣列加入迭代後的物件轉陣列 =2DArray
                marketingShareArray.push(values);
            });
        }

        // 動態創建table>Tbody內的tr與td(參數傳入陣列)
        function CreateTbody(data) {
            // 將傳入的陣列進行forEach迭代
            data.forEach(item => {
                // 創建<tr>標籤指派給TbodyTR變數
                let TbodyTR = document.createElement("tr");
                // 陣列迭代出來的物件再次進行迭代
                item.forEach(item => {
                    // 創建<td>標籤指派給td變數
                    let td = document.createElement("td");
                    // 將物件迭代出來的值指派給td.innerText設定文字內容
                    td.innerText = item;
                    // 將製作好的td加入TbodyTR
                    TbodyTR.append(td);
                });
                // 將製作好的TbodyTR加入tbody
                tbody.append(TbodyTR);
                // 將製作好的tbody加入至table(這邊table已加入至container)
                table.append(tbody);
            })
        }





        //轉換現有的資料結構:物件屬性 轉 陣列
        //Ratio=>data,  Name=>companies
        function createArrayData() {
            // 0.forEach()
            marketingShare.data.forEach(item => {
                companies.push(item.Name);
                data.push(item.Ratio);
            })

            // 3.for of 迭代出來是-item
            // for (let k of marketingShare.data) {
            //     companies[k.Ranking-1] = marketingShare.data[k.Ranking-1].Name;
            //     data[k.Ranking-1] = marketingShare.data[k.Ranking-1].Ratio;
            // }

            // 4.for of 迭代出來是-item 
            // for (let k of marketingShare.data) {
            //     companies.push(k.Name);
            //     data.push(k.Ratio);
            // }

            // 5.forEach()
            // marketingShare.data.forEach((item, index) => {
            //         companies[index] = marketingShare.data[index].Name;
            //         data[index] = marketingShare.data[index].Ratio;
            // })

        }
    </script>




    <script>
        //繪製餅圖: 參數1= type:
        // 第二個參數為公司陣列(X軸), 第三個參數為資料陣列(Y軸)
        //Pie Chart圓餅圖
        // function drawPieChart(chartType, companyArray, dataArray) {
        function drawChart(chartType, companyArray, dataArray) {
            // 抓取<canvas id="mkShare"></canvas>繪圖標籤
            let ctxPie = document.getElementById("mkShare");
            var pieChart = new Chart(ctxPie, {
                //type=傳入的第一個參數
                type: chartType,
                data: {
                    //labels=傳入的第二個參數
                    labels: companyArray,
                    datasets: [{
                        //data=傳入的第三個參數
                        data: dataArray,
                        //自定義每塊資料顏色
                        backgroundColor: [
                            'rgb(255, 99, 132)',
                            'rgb(255,75,50)',
                            'rgb(255, 205, 86)',
                            'rgb(75, 192, 192)',
                            'rgb(54, 162, 235)',
                            'rgb(153, 102, 255)',
                            'rgb(201, 203, 207)',
                            'rgb(255, 138, 64)',
                            'rgb(142, 65, 64)',
                            'rgb(59, 72, 64)'
                        ]
                    }],
                },
                options: {
                    responsive: true,
                    title: {
                        display: true,
                        fontSize: 26,
                        text: '2021年全球晶圓代工市佔率%'
                    },
                    tooltips: {
                        mode: 'point',
                        intersect: true,
                    },
                    legend: {
                        position: 'bottom',
                        labels: {
                            fontColor: 'black',
                        }
                    }
                }
            });
        }
