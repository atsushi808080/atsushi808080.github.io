<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
          overflow: hidden;
        }
      
        .left-span {
          float: left;
          text-align: left;
        }
      
        .right-span {
          float: right;
          text-align: right;
        }
      
        .clear {
          clear: both;
        }
      </style>
</head>
<body>
    <div class="container">
        <span class="left-span">左1</span>
        <span class="left-span">左2</span>
        <span class="left-span">左3</span>
        <span class="right-span">右1</span>
        <span class="right-span">右2</span>
        <span class="right-span">右3</span>
        <div class="clear"></div>
      </div>
</body>
</html>
